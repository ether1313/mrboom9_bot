# fly.toml app configuration file generated for mrboom9-bot on 2026-03-03T16:49:45+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mrboom9-bot'
primary_region = 'sin'

[build]

[deploy]
  strategy = 'immediate'

[env]
  PYTHONUNBUFFERED = '1'

[processes]
  app = 'python bot.py'

[[mounts]]
  source = 'mrboom9_bot_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
